<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unnoticed Dance</title>
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="overlay">
        <h1>Unnoticed Dance</h1>
        <p>Use your webcam to record body motion, then replay it slightly shifted as a dance.</p>
        <div class="controls">
          <button id="recordButton" type="button">Start Recording</button>
          <button id="playOriginalButton" type="button" disabled>Play Original</button>
          <button id="playButton" type="button" disabled>Play Dance</button>
          <button id="clearButton" type="button">Clear Motion</button>
          <button id="retryCameraButton" type="button">Enable Camera</button>
        </div>
        <div class="controls">
          <button id="pausePlaybackButton" type="button" disabled>Pause</button>
          <button id="setStartButton" type="button" disabled>Set Start</button>
          <button id="setEndButton" type="button" disabled>Set End</button>
          <button id="resetTrimButton" type="button" disabled>Reset Trim</button>
          <button id="saveTrimmedCopyButton" type="button" disabled>Save Trimmed Copy</button>
        </div>
        <div class="controls setup-only">
          <button id="cameraModeButton" type="button" class="mode-active">Camera</button>
          <button id="fileModeButton" type="button">Video File</button>
        </div>
        <div class="recording-library setup-only">
          <label for="cameraSelect">Camera</label>
          <select id="cameraSelect">
            <option value="">Default camera</option>
          </select>
        </div>
        <div class="recording-library setup-only" id="videoFileRow" style="display: none;">
          <label for="videoFileInput">Video File</label>
          <input id="videoFileInput" type="file" accept="video/*" />
          <button id="resetVideoButton" type="button">Reset</button>
        </div>
        <div class="recording-library setup-only">
          <label for="recordingSelect">Saved Motion</label>
          <select id="recordingSelect">
            <option value="">No saved recordings</option>
          </select>
          <button id="deleteRecordingButton" type="button" disabled>Delete Saved</button>
        </div>
        <div class="recording-library setup-only">
          <button id="exportRecordingButton" type="button" disabled>Export Selected</button>
          <button id="exportAllButton" type="button">Export All</button>
        </div>
        <div class="recording-library setup-only">
          <label for="importFileInput">Import</label>
          <input id="importFileInput" type="file" accept=".zip" />
          <label class="recording-option" for="importOverwriteCheckbox">
            <input id="importOverwriteCheckbox" type="checkbox" />
            Overwrite on ID match
          </label>
        </div>
        <label class="recording-option setup-only" for="saveOriginalVideoCheckbox">
          <input id="saveOriginalVideoCheckbox" type="checkbox" />
          Save original video
        </label>
        <div class="recording-library setup-only">
          <label for="ruleSetSelect">Rule Set</label>
          <select id="ruleSetSelect"></select>
          <button id="saveRuleSetButton" type="button">Save Rules</button>
          <button id="deleteRuleSetButton" type="button" disabled>Delete Rules</button>
        </div>
        <div class="rule-controls">
          <label for="bpmSlider">BPM</label>
          <input id="bpmSlider" type="range" min="60" max="180" step="1" value="120" />
          <input id="bpmInput" type="number" min="60" max="180" step="1" value="120" />
          <div class="panel-rule-grid">
            <label for="panelRuleSelect0">Panel 1</label>
            <select id="panelRuleSelect0"></select>
            <label for="panelRuleSelect1">Panel 2</label>
            <select id="panelRuleSelect1"></select>
            <label for="panelRuleSelect2">Panel 3</label>
            <select id="panelRuleSelect2"></select>
            <label for="panelRuleSelect3">Panel 4</label>
            <select id="panelRuleSelect3"></select>
            <label for="panelRuleSelect4">Panel 5</label>
            <select id="panelRuleSelect4"></select>
          </div>
        </div>
        <div class="status">Status: click Enable Camera</div>
        <div class="status" id="frameCounter">Frame: -</div>
      </div>
    </div>
    <script type="module" src="src/main.ts"></script>
  </body>
</html>
